<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 4 Color Picker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Color Picker</h1>
    <div class="color-card" id="colorCard">
      <p class="color-label">Current Color</p>
      <p class="color-code" id="colorCode">#FFFFFF</p>
      <button id="changeColorBtn" class="btn">Pick a Random Color</button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
