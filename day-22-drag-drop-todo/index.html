<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop To-Do Board | Day 22</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-info">
                <span class="day-badge">Day 22</span>
                <h1>Drag & Drop Board</h1>
            </div>
            <a href="../30-days-js-challenges.md" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Challenge List
            </a>
        </header>

        <!-- Controls Toolbar -->
        <section class="toolbar">
            <div class="search-wrapper">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Filter tasks by text or tag...">
            </div>
            <div class="toolbar-actions">
                <button id="clearCompletedBtn" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    Clear Completed
                </button>
                <button id="globalAddBtn" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Task
                </button>
            </div>
        </section>

        <!-- Kanban Board -->
        <main class="board-container">
            <!-- To Do Column -->
            <div class="board-column" data-status="todo">
                <div class="column-header">
                    <div class="column-title-group">
                        <span class="status-indicator status-todo"></span>
                        <h2>To Do</h2>
                        <span class="task-count" id="todo-count">0</span>
                    </div>
                    <button class="column-add-btn" data-column="todo" title="Add task to To Do">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div class="task-list" id="todo-list" data-status="todo">
                    <!-- Tasks will be rendered here -->
                </div>
            </div>

            <!-- In Progress Column -->
            <div class="board-column" data-status="in-progress">
                <div class="column-header">
                    <div class="column-title-group">
                        <span class="status-indicator status-progress"></span>
                        <h2>In Progress</h2>
                        <span class="task-count" id="in-progress-count">0</span>
                    </div>
                    <button class="column-add-btn" data-column="in-progress" title="Add task to In Progress">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div class="task-list" id="in-progress-list" data-status="in-progress">
                    <!-- Tasks will be rendered here -->
                </div>
            </div>

            <!-- Completed Column -->
            <div class="board-column" data-status="completed">
                <div class="column-header">
                    <div class="column-title-group">
                        <span class="status-indicator status-completed"></span>
                        <h2>Completed</h2>
                        <span class="task-count" id="completed-count">0</span>
                    </div>
                    <button class="column-add-btn" data-column="completed" title="Add task to Completed">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <div class="task-list" id="completed-list" data-status="completed">
                    <!-- Tasks will be rendered here -->
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 30 Days JavaScript Challenge - Day 22 | Drag & Drop To-Do</p>
        </footer>
    </div>

    <!-- Task Modal (Add / Edit) -->
    <div id="taskModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Task</h2>
                <button id="closeModalBtn" class="close-btn" title="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <form id="taskForm">
                <input type="hidden" id="modalTaskId">
                <input type="hidden" id="modalTaskStatus" value="todo">
                
                <div class="form-group">
                    <label for="taskTitle">Task Title *</label>
                    <input type="text" id="taskTitle" required placeholder="What needs to be done?" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="taskDesc">Description</label>
                    <textarea id="taskDesc" placeholder="Add some details about this task..." rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="taskTag">Tag / Label</label>
                        <input type="text" id="taskTag" placeholder="e.g. Design, Bug, Docs" maxlength="15" autocomplete="off">
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancelModalBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" id="saveTaskBtn" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script -->
    <script src="app.js"></script>
</body>
</html>
