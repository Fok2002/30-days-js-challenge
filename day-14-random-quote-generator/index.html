<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Day 14 - Random Quote Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Random Quote Generator</h1>
    <p class="lead">Get inspired with a fresh quote and copy it with one click.</p>

    <section class="quote-card">
      <blockquote id="quote">Loading a quote...</blockquote>
      <p id="author" class="author">—</p>
    </section>

    <div class="actions">
      <button id="newQuote" class="btn">New Quote</button>
      <button id="copyQuote" class="btn alt">Copy</button>
    </div>

    <div id="message" class="message">Click “New Quote” to refresh the quote.</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
