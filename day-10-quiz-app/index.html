<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="quiz-container">
            <h1>Quiz App</h1>
            
            <!-- Quiz Section -->
            <div id="quizSection" class="quiz-section">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="question-counter">
                    Question <span id="currentQuestion">1</span> of <span id="totalQuestions">5</span>
                </div>
                
                <h2 id="questionText" class="question-text"></h2>
                
                <div id="optionsContainer" class="options-container"></div>
                
                <button id="nextBtn" class="btn next-btn" disabled>Next Question</button>
            </div>
            
            <!-- Results Section -->
            <div id="resultsSection" class="results-section hidden">
                <h2>Quiz Complete!</h2>
                <div class="score-display">
                    <p class="score-text">Your Score</p>
                    <div class="score-value">
                        <span id="scoreValue">0</span> / <span id="totalScore">5</span>
                    </div>
                </div>
                <p class="percentage" id="percentage"></p>
                <p class="result-message" id="resultMessage"></p>
                <button id="restartBtn" class="btn restart-btn">Retake Quiz</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
