<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Day 15</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="weather-header">
            <h1>Weather App</h1>
            <p>Search for any city to get current weather</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter city name..."
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">Search</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="weatherContainer" class="weather-container hidden">
            <div class="weather-main">
                <div class="city-info">
                    <h2 id="cityName" class="city-name"></h2>
                    <p id="weatherDescription" class="weather-description"></p>
                </div>
                <div class="temperature-section">
                    <div class="temperature">
                        <span id="temperature" class="temp-value"></span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-card">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value"><span id="feelsLike"></span>°C</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value"><span id="humidity"></span>%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value"><span id="pressure"></span> hPa</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value"><span id="windSpeed"></span> m/s</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Visibility</div>
                    <div class="detail-value"><span id="visibility"></span> km</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">UV Index</div>
                    <div class="detail-value"><span id="uvIndex"></span></div>
                </div>
            </div>

            <div class="sunrise-sunset">
                <div class="sun-info">
                    <span class="sun-label">🌅 Sunrise:</span>
                    <span id="sunrise" class="sun-time"></span>
                </div>
                <div class="sun-info">
                    <span class="sun-label">🌇 Sunset:</span>
                    <span id="sunset" class="sun-time"></span>
                </div>
            </div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="loader"></div>
            <p>Loading weather data...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
