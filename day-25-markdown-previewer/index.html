<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkFok | Live Markdown Previewer — Day 25</title>
  <meta name="description"
    content="A live Markdown editor with real-time HTML preview, syntax highlighting, toolbar shortcuts, and export options. Day 25 of the 30 Days JavaScript Challenge.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Mark<span class="accent">Fok</span></h1>
          <span class="brand-subtitle">Live Markdown Editor</span>
        </div>
      </div>

      <div class="header-stats">
        <div class="stat-pill" id="stat-words">
          <span class="stat-num" id="word-count">0</span>
          <span class="stat-lbl">words</span>
        </div>
        <div class="stat-pill" id="stat-chars">
          <span class="stat-num" id="char-count">0</span>
          <span class="stat-lbl">chars</span>
        </div>
        <div class="stat-pill" id="stat-lines">
          <span class="stat-num" id="line-count">0</span>
          <span class="stat-lbl">lines</span>
        </div>
        <div class="stat-pill" id="stat-read">
          <span class="stat-num" id="read-time">0</span>
          <span class="stat-lbl">min read</span>
        </div>
      </div>

      <div class="header-actions">
        <button class="hdr-btn" id="btn-copy-html" title="Copy HTML output">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          Copy HTML
        </button>
        <button class="hdr-btn" id="btn-download-md" title="Download as Markdown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Export
        </button>
        <button class="hdr-btn theme-btn" id="btn-theme" title="Toggle theme" aria-label="Toggle light/dark theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" role="toolbar" aria-label="Formatting toolbar">
      <div class="toolbar-group">
        <button class="tb-btn" id="tb-h1" data-action="h1" title="Heading 1 (Ctrl+1)"><b>H1</b></button>
        <button class="tb-btn" id="tb-h2" data-action="h2" title="Heading 2 (Ctrl+2)"><b>H2</b></button>
        <button class="tb-btn" id="tb-h3" data-action="h3" title="Heading 3 (Ctrl+3)"><b>H3</b></button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="tb-btn" id="tb-bold" data-action="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button class="tb-btn" id="tb-italic" data-action="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button class="tb-btn" id="tb-strike" data-action="strike" title="Strikethrough"><s>S</s></button>
        <button class="tb-btn" id="tb-code-inline" data-action="code-inline" title="Inline code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        </button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="tb-btn" id="tb-link" data-action="link" title="Insert Link (Ctrl+K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        </button>
        <button class="tb-btn" id="tb-image" data-action="image" title="Insert Image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </button>
        <button class="tb-btn" id="tb-ul" data-action="ul" title="Unordered List">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        </button>
        <button class="tb-btn" id="tb-ol" data-action="ol" title="Ordered List">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"></line><line x1="10" y1="12" x2="21" y2="12"></line><line x1="10" y1="18" x2="21" y2="18"></line><path d="M4 6h1v4"></path><path d="M4 10h2"></path><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path></svg>
        </button>
        <button class="tb-btn" id="tb-blockquote" data-action="blockquote" title="Blockquote">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 2v6c0 1.25.75 2 2 2h2.5z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 2v6c0 1.25.75 2 2 2h2.5z"/></svg>
        </button>
        <button class="tb-btn" id="tb-codeblock" data-action="codeblock" title="Code Block">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
        <button class="tb-btn" id="tb-table" data-action="table" title="Insert Table">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/><line x1="15" y1="9" x2="15" y2="21"/></svg>
        </button>
        <button class="tb-btn" id="tb-hr" data-action="hr" title="Horizontal Rule">—</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="tb-btn" id="tb-clear" data-action="clear" title="Clear editor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
        <button class="tb-btn" id="tb-sample" data-action="sample" title="Load sample">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
      </div>
      <div class="toolbar-spacer"></div>
      <!-- View mode toggles -->
      <div class="toolbar-group view-modes">
        <button class="tb-btn view-btn active" id="view-split" data-view="split" title="Split view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/></svg>
        </button>
        <button class="tb-btn view-btn" id="view-editor" data-view="editor" title="Editor only">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="18" rx="1"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg>
        </button>
        <button class="tb-btn view-btn" id="view-preview" data-view="preview" title="Preview only">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="18" rx="1"/><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <!-- Main Editor Area -->
    <main class="editor-shell" id="editor-shell">

      <!-- Editor Pane -->
      <div class="pane editor-pane" id="editor-pane">
        <div class="pane-header">
          <div class="pane-label">
            <span class="pane-dot dot-editor"></span>
            Markdown
          </div>
          <div class="pane-actions">
            <span class="live-badge">
              <span class="live-dot"></span>
              live
            </span>
          </div>
        </div>
        <div class="editor-wrapper">
          <div class="line-numbers" id="line-numbers" aria-hidden="true"></div>
          <textarea
            id="md-editor"
            class="md-textarea"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            aria-label="Markdown editor"
            aria-multiline="true"
            placeholder="Start typing Markdown here..."
          ></textarea>
        </div>
      </div>

      <!-- Resize Handle -->
      <div class="resize-handle" id="resize-handle" title="Drag to resize" aria-hidden="true">
        <div class="resize-dots"></div>
      </div>

      <!-- Preview Pane -->
      <div class="pane preview-pane" id="preview-pane">
        <div class="pane-header">
          <div class="pane-label">
            <span class="pane-dot dot-preview"></span>
            Preview
          </div>
          <div class="pane-actions">
            <button class="pane-action-btn" id="btn-fullscreen-preview" title="Toggle fullscreen preview" aria-label="Toggle fullscreen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            </button>
          </div>
        </div>
        <div class="preview-wrapper">
          <article id="md-preview" class="md-preview" aria-live="polite" aria-atomic="true"></article>
        </div>
      </div>

    </main>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container" aria-live="assertive"></div>

    <!-- Footer -->
    <footer class="app-footer">
      <span>Press <kbd>Ctrl</kbd>+<kbd>B</kbd> bold • <kbd>Ctrl</kbd>+<kbd>I</kbd> italic • <kbd>Ctrl</kbd>+<kbd>K</kbd> link • <kbd>Tab</kbd> indent</span>
      <span class="challenge-tag">Day 25 • 30 Days JavaScript Challenge</span>
    </footer>

  </div>

  <script src="app.js"></script>
</body>

</html>
