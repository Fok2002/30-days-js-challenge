<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 3 Digital Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Digital Clock</h1>
    <div class="clock-card">
      <p class="clock-label">Live Time</p>
      <p class="clock-time" id="clockTime">00:00:00 AM</p>
      <p class="clock-date" id="clockDate">Monday, January 1, 1970</p>
      <p class="clock-uptime" id="clockUptime">Session duration: 00:00:00</p>
      <button id="toggleFormat" class="btn">Switch to 24-hour</button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
