<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Day 12 - Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Expense Tracker</h1>

    <div class="balance-box">
      <h2>Your Balance</h2>
      <div id="balance">$0.00</div>
      <div class="totals">
        <div class="income">Income<br/><span id="money-plus">$0.00</span></div>
        <div class="expense">Expense<br/><span id="money-minus">$0.00</span></div>
      </div>
    </div>

    <div class="form-box">
      <h3>Add new transaction</h3>
      <form id="form">
        <input type="text" id="text" placeholder="Enter description" required />
        <input type="number" id="amount" placeholder="Amount (positive or negative)" required />
        <button class="btn">Add transaction</button>
      </form>
    </div>

    <h3>History</h3>
    <ul id="list" class="list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
